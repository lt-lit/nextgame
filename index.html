<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1" />
  <meta name="theme-color" content="#0e0f13" />
  <title>NextGame</title>
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">Next<span>Game</span></div>
    <div class="topbar-right">
      <div class="pool"><b id="poolCount">—</b> in pool</div>
      <button id="resetBtn" class="ghost-btn" title="Reset everything">reset</button>
    </div>
  </header>

  <div id="activeChips" class="chip-row active-chips" hidden></div>

  <!-- the rolled game IS the main view (or the empty prompt before first roll) -->
  <main class="stage">
    <div id="view" class="view">
      <div class="empty-prompt">
        <div class="empty-emoji">🎲</div>
        <p>Hit <b>Roll</b> to pick something to play.</p>
      </div>
    </div>
  </main>

  <!-- persistent control bar: the core loop lives here -->
  <div class="hero" id="hero">
    <button id="filterBtn" class="hero-side" aria-label="Filters">
      <span class="ico">⚙</span><span id="filterDot" class="dot" hidden></span>
    </button>
    <button id="rollBtn" class="roll-btn">Roll</button>
    <button id="acceptBtn" class="act act-accept" hidden>✓ I'll play this</button>
  </div>

  <!-- filter drawer (a legitimate sheet — it overlays the game and you return) -->
  <div id="drawerBackdrop" class="backdrop" hidden></div>
  <aside id="drawer" class="drawer" aria-label="Filters">
    <div class="drawer-grip"></div>
    <div class="drawer-head">
      <h2>Filters</h2>
      <button id="clearFilters" class="ghost-btn">clear all</button>
    </div>
    <div class="drawer-body" id="drawerBody"></div>
    <div class="drawer-foot">
      <button id="applyFilters" class="roll-btn wide">Show <span id="drawerCount">—</span> games</button>
    </div>
  </aside>

  <script type="module" src="js/main.js"></script>
</body>
</html>
